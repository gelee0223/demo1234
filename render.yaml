services:
  - type: web
    name: memo-app
    runtime: node
    plan: free
    rootDir: memo-app
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: TURSO_URL
        sync: false
      - key: TURSO_TOKEN
        sync: false
      - key: NODE_ENV
        value: production
